[llm]
# API endpoint (Anthropic-compatible)
api_url = https://api.anthropic.com/v1/messages

# Authentication token (Bearer or x-api-key)
api_key = YOUR_API_KEY_HERE

# Model to use for digest generation
model = claude-haiku-4-5-20251001

# Max tokens for digest output
max_tokens = 512

# Whether to actually call the LLM (set to false to use mock)
enabled = false
