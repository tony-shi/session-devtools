[llm]
# API base URL（Anthropic-compatible）
# 优先级：ANTHROPIC_BASE_URL 环境变量 > 此处配置 > 默认值
base_url = https://internal-llm.example

# Bearer token（Authorization: Bearer <token>）
# 可通过环境变量 ANTHROPIC_API_KEY 或直接填写此处
token = e44b3a836c014965932d408ba8dae89d

# 使用的模型
model = claude-opus-4-6

# 日报最大输出 token 数
max_tokens = 4096

# 是否启用真实 LLM 调用（设为 true 且填写 token 后生效）
enabled = true